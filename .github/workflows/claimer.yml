# ============================================
# BEAN MINER AGENT - Claimer Workflow
# Runs every 2 hours to harvest ETH rewards
# back into your wallet automatically
# ============================================

name: 🌾 RICE Harvester

on:
  schedule:
    - cron: '0 */2 * * *'    # Every 2 hours
  workflow_dispatch:           # Trigger manually from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Fix Node deprecation warning

jobs:
  claim:
    name: Claim Rewards
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Claim ETH rewards
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: node claim_rewards.js --type=eth
        continue-on-error: true

      - name: Claim BEAN rewards
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: node claim_rewards.js --type=bean
        continue-on-error: true
