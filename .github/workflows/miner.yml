# ============================================
# BEAN MINER AGENT - Miner Workflow
# Runs every 5 minutes, checks for new rounds
# and deploys bets automatically
# ============================================

name: 🫘 BEAN Miner

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:          # Trigger manually from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Fix Node deprecation warning

jobs:
  mine:
    name: Run Mining Bot
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run miner
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: node auto_miner.js
        continue-on-error: true
